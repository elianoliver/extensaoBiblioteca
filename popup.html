<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Extensão</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="base.css">
</head>

<body class="container-narrow">
    <!-- Título principal usando nossa classe base para títulos -->
    <h1 class="titulo" >Situação do Aluno</h1>

    <!-- Container de input com a matrícula e botão de adicionar -->
    <div class="input-group">
        <input
            type="number"
            id="matricula"
            class="form-control"
            placeholder="Cole a matrícula aqui..."
            aria-label="Número de matrícula">
        <button id="btAdicionarItem" class="btn btn-primary btn-add" aria-label="Adicionar matrícula">
            +
        </button>
    </div>

    <!-- Container da tabela que será preenchida via JavaScript -->
    <div class="table-container" id="tabelaContainer">
        <!-- A tabela será inserida aqui dinamicamente com a classe 'table' -->
    </div>

    <!-- Container dos parâmetros de consulta -->
    <div class="form-group input-group">
        <input
            type="text"
            id="dtid"
            class="form-control"
            placeholder="dtid ex: z__h_0"
            aria-label="DTID">
        <input
            type="text"
            id="uuid"
            class="form-control"
            placeholder="uuid ex: bBwR8"
            aria-label="UUID">
    </div>

    <!-- Footer com contador e botão de ação -->
    <div class="footer">
        <div class="total-counter">
            Total de Matrículas: <span>0</span>
        </div>
        <a href="../opcoes/opcoes.html">
            <button class="btn btn-primary">Verificar Situação</button>
        </a>
        <a href="../massa/situacao.html">
            <button class="btn btn-secondary">Carregar arquivo</button>
        </a>
    </div>

    <script type="module" src="./individual/situacao.js"></script>
    <script src="popup.js"></script>
</body>

</html>
